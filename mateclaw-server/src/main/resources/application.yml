server:
  port: 18088
  servlet:
    context-path: /

spring:
  application:
    name: mateclaw-server
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
  profiles:
    active: dev

  # 数据源（默认 H2，生产切换为 mysql profile）
  datasource:
    url: jdbc:h2:file:./data/mateclaw;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # SQL 初始化由 DatabaseBootstrapRunner 接管，关闭 Spring 自动执行
  sql:
    init:
      mode: never

  h2:
    console:
      enabled: true
      path: /h2-console

  # Spring AI Alibaba (DashScope) - Spring AI Alibaba 1.1.x 配置路径
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-dashscope-api-key-here}
      chat:
        options:
          model: qwen-max
          temperature: 0.7
          max-tokens: 4096
    # Spring AI 1.1.x 会话记忆配置（使用内嵌 H2 时无需额外配置）
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: embedded
    # 禁用 Spring AI MCP Client 自动配置（由 McpClientManager 自行管理生命周期）
    mcp:
      client:
        enabled: false

# MyBatis Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j API 文档
knife4j:
  enable: true
  setting:
    language: zh_cn

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# MateClaw 自定义配置
mateclaw:
  jwt:
    secret: MateClaw-JWT-Secret-Key-2024-Please-Change-In-Production
    expiration: 86400000
  # 搜索配置已迁移至数据库（mate_system_setting 表），通过 UI 系统设置管理
  # MCP server 配置已迁移至数据库（mate_mcp_server 表），通过 UI 管理
  mcp:
    enabled: true
  skill:
    workspace:
      root: ${user.home}/.mateclaw/skills
      auto-init: true
      delete-policy: archive
    hub:
      base-url: https://clawhub.ai
      search-path: /api/v1/search
      http-timeout: 15
      http-retries: 3

# MateClaw Agent 配置
mate:
  agent:
    graph:
      observation:
        max-single-observation-chars: 4000
        max-total-observation-chars: 12000
        large-result-threshold: 3000
        min-rounds-for-summarize: 3
        head-ratio: 0.4
        truncation-marker: "\n\n... [内容已截断，共 %d 字符，保留前后关键片段] ...\n\n"
    conversation:
      window:
        # 测试时临时调低：2000 token ≈ 2000 中文字，3 轮对话即可触发压缩
        # 生产环境应改回 128000
        default-max-input-tokens: 128000
        compact-trigger-ratio: 0.75
        preserve-recent-pairs: 2
        summary-max-tokens: 300
